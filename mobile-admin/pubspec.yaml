name: fangyuan_admin
description: 方·苑 FANGYUAN 管理员 App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9

  # 路由
  go_router: ^13.0.0

  # 网络
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1

  # 图片
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7

  # 存储
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  fluttertoast: ^8.2.4
  fl_chart: ^0.66.0

  # 推送
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9

  # 富文本(资讯编辑)
  flutter_quill: ^9.2.10

  # 工具
  intl: any
  equatable: ^2.0.5
  logger: ^2.0.2+1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

dependency_overrides:
  vector_math: 2.1.4


flutter_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
